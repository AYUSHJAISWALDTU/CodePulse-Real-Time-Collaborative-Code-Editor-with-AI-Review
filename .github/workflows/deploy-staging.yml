name: Deploy to Staging

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/codepulse

jobs:
  deploy:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Images
        run: |
          for service in web api realtime worker; do
            docker buildx build \
              --file infra/docker/${service}.Dockerfile \
              --tag ${{ env.IMAGE_PREFIX }}-${service}:${{ github.sha }} \
              --tag ${{ env.IMAGE_PREFIX }}-${service}:staging \
              --push \
              .
          done

      - name: Deploy to Kubernetes
        run: |
          echo "Deploy step: apply K8s manifests with image tag ${{ github.sha }}"
          # kubectl set image deployment/web web=${{ env.IMAGE_PREFIX }}-web:${{ github.sha }} -n codepulse
          # kubectl set image deployment/api api=${{ env.IMAGE_PREFIX }}-api:${{ github.sha }} -n codepulse
          # kubectl set image deployment/realtime realtime=${{ env.IMAGE_PREFIX }}-realtime:${{ github.sha }} -n codepulse
          # kubectl set image deployment/worker worker=${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }} -n codepulse
          # kubectl rollout status deployment/api -n codepulse --timeout=120s

      - name: Smoke Test
        run: |
          echo "Run smoke tests against staging endpoint"
          # curl -f https://staging.codepulse.example.com/api/health || exit 1
