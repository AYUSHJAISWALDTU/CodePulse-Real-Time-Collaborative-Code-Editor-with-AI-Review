apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: codepulse
  labels:
    app: codepulse
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codepulse
      component: web
  template:
    metadata:
      labels:
        app: codepulse
        component: web
    spec:
      containers:
        - name: web
          image: codepulse/web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: codepulse-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: codepulse
spec:
  selector:
    app: codepulse
    component: web
  ports:
    - port: 3000
      targetPort: 3000
