apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: codepulse
  labels:
    app: codepulse
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codepulse
      component: api
  template:
    metadata:
      labels:
        app: codepulse
        component: api
    spec:
      containers:
        - name: api
          image: codepulse/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: codepulse-config
            - secretRef:
                name: codepulse-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: codepulse
spec:
  selector:
    app: codepulse
    component: api
  ports:
    - port: 4000
      targetPort: 4000
