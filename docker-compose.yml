version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: codepulse-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: codepulse
      POSTGRES_PASSWORD: codepulse
      POSTGRES_DB: codepulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codepulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
